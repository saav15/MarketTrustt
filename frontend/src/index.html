<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketTrust - Reputación Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { brand: { 50: '#f0fdf4', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 900: '#14532d' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4 sm:p-8 bg-gradient-to-br from-slate-900 via-brand-900 to-slate-900 relative overflow-x-hidden overflow-y-auto flex flex-col items-center justify-start lg:justify-center">
    <!-- Decoración de fondo -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-20 pointer-events-none"></div>

    <div class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-10 z-10 my-4 lg:my-0">
        
        <!-- Columna Izquierda: Generador -->
        <div class="flex flex-col justify-center">
            <div class="glass-panel p-10 rounded-3xl shadow-2xl w-full transform transition hover:scale-[1.01] duration-300">
                <div class="mb-6 inline-block bg-brand-500 p-4 rounded-full shadow-[0_0_30px_rgba(34,197,94,0.4)]">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <h1 class="text-5xl font-bold mb-3 text-transparent bg-clip-text bg-gradient-to-r from-brand-500 to-emerald-300">MarketTrust</h1>
                <p class="text-slate-300 mb-8 text-lg font-light">Digitalizando la confianza en tu mercado local.</p>
                
                <div class="space-y-5">
                    <input type="text" id="vendorQr" placeholder="Ingresa ID o QR (Ej. 101, 102)" class="w-full px-5 py-4 rounded-xl bg-slate-800/60 border border-slate-600 text-white placeholder-slate-400 focus:outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/50 transition duration-200">
                    <button onclick="viewCertificate()" class="w-full bg-gradient-to-r from-brand-600 to-brand-500 hover:from-brand-500 hover:to-brand-400 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-brand-500/50 transition-all transform active:scale-95 duration-200">
                        Generar Certificado Digital
                    </button>
                </div>
            </div>
        </div>

        <!-- Columna Derecha: Panel de Actividad -->
        <div class="glass-panel p-5 sm:p-8 rounded-3xl shadow-2xl flex flex-col gap-6 sm:gap-8 h-[680px] sm:h-[750px] overflow-hidden">
            
            <!-- Leaderboards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 relative z-20">
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 relative">
                    <h3 class="text-emerald-400 font-bold mb-3 flex items-center gap-2"><span class="text-xl">🏆</span> Mejores Calificados</h3>
                    <div id="topPositive" class="space-y-2 text-sm">
                        <div class="animate-pulse bg-slate-700 h-8 rounded"></div>
                    </div>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-2xl border border-slate-700 relative">
                    <h3 class="text-amber-400 font-bold mb-3 flex items-center gap-2"><span class="text-xl">📈</span> Áreas de Mejora</h3>
                    <div id="topNegative" class="space-y-2 text-sm">
                        <div class="animate-pulse bg-slate-700 h-8 rounded"></div>
                    </div>
                </div>
            </div>


            <!-- Feed en Vivo -->
            <div class="flex-grow flex flex-col overflow-hidden">
                <h3 class="text-brand-300 font-bold mb-4 text-xl flex items-center gap-3">
                    <span class="relative flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 bg-brand-500"></span>
                    </span>
                    Actividad en Tiempo Real
                </h3>
                <div id="liveFeed" class="space-y-3 overflow-y-auto pr-2 custom-scrollbar pb-4 flex-grow">
                    <div class="animate-pulse bg-slate-700 h-24 rounded-xl"></div>
                    <div class="animate-pulse bg-slate-700 h-24 rounded-xl opacity-70"></div>
                </div>
            </div>

        </div>
    </div>
    
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(30, 41, 59, 0.5); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(34, 197, 94, 0.5); border-radius: 10px; }
    </style>

    <script>
        function viewCertificate() {
            const qr = document.getElementById('vendorQr').value.trim();
            if(!qr) { alert('Por favor ingresa un ID de vendedor válido (Ej. 101, 102)'); return; }
            window.location.href = `certificate.html?qr=${qr}`;
        }

        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8000'
            : 'https://markettrustt-production.up.railway.app';

        async function updateLeaderboards() {
            try {
                const res = await fetch(`${API_BASE}/leaderboard`);
                if(!res.ok) return;
                const data = await res.json();
                
                const posContainer = document.getElementById('topPositive');
                posContainer.innerHTML = data.top_positive.map((v, i) => {
                    const isPerfect = v.avg >= 5.0;
                    const borderClass = isPerfect ? 'border-amber-400/80 ring-2 ring-amber-400/50 shadow-[0_0_15px_rgba(251,191,36,0.6)] animate-pulse' : 'border-slate-700/50';
                    const ratingColor = isPerfect ? 'text-amber-400 font-extrabold flex items-center gap-1 drop-shadow-[0_0_8px_rgba(251,191,36,0.5)]' : 'text-emerald-400 font-bold';
                    const ratingText = isPerfect ? '👑 5.0★' : `${v.avg.toFixed(1)}★`;
                    return `
                    <div class="group relative flex justify-between items-center bg-slate-900/50 p-2 rounded-lg border transition hover:bg-slate-800 cursor-help ${borderClass}">
                        <span class="text-slate-300 truncate w-3/4 font-medium"><span class="text-slate-500 mr-1">#${i+1}</span> ${v.name} <span class="text-[10px] text-slate-500 bg-slate-800 px-1.5 py-0.5 rounded ml-1">ID:${v.qr}</span></span>
                        <span class="${ratingColor}">${ratingText}</span>
                        
                        <!-- Tooltip flotante (Glassmorphism) -->
                        <div class="pointer-events-none absolute bottom-[115%] left-1/2 -translate-x-1/2 mb-2 w-64 bg-slate-950/95 border ${isPerfect ? 'border-amber-400/50 shadow-[0_0_20px_rgba(251,191,36,0.4)]' : 'border-brand-500/30'} text-xs text-slate-200 p-3 rounded-xl shadow-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-50 backdrop-blur-md">
                            <div class="font-bold ${isPerfect ? 'text-amber-400' : 'text-brand-300'} mb-1 flex justify-between">
                                <span>${v.name} ${isPerfect ? '👑' : ''}</span>
                                <span class="text-emerald-400">${v.avg.toFixed(1)}★</span>
                            </div>
                            <p class="font-light text-slate-400 leading-normal">${v.description}</p>
                            <div class="text-[9px] text-slate-500 mt-1.5 italic flex justify-between">
                                <span>ID del puesto: #${v.qr}</span>
                                <span>Total: ${v.count} reseñas</span>
                            </div>
                            <!-- Flecha del tooltip -->
                            <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-950"></div>
                        </div>
                    </div>
                    `;
                }).join('') || '<p class="text-slate-500 text-xs italic">Sin datos suficientes</p>';

                const negContainer = document.getElementById('topNegative');
                negContainer.innerHTML = data.top_negative.map((v, i) => {
                    const isPerfect = v.avg >= 5.0;
                    const borderClass = isPerfect ? 'border-amber-400/80 ring-2 ring-amber-400/50 shadow-[0_0_15px_rgba(251,191,36,0.6)] animate-pulse' : 'border-slate-700/50';
                    const ratingColor = isPerfect ? 'text-amber-400 font-extrabold flex items-center gap-1 drop-shadow-[0_0_8px_rgba(251,191,36,0.5)]' : 'text-amber-400 font-bold';
                    const ratingText = isPerfect ? '👑 5.0★' : `${v.avg.toFixed(1)}★`;
                    return `
                    <div class="group relative flex justify-between items-center bg-slate-900/50 p-2 rounded-lg border transition hover:bg-slate-800 cursor-help ${borderClass}">
                        <span class="text-slate-300 truncate w-3/4 font-medium"><span class="text-slate-500 mr-1">#${i+1}</span> ${v.name} <span class="text-[10px] text-slate-500 bg-slate-800 px-1.5 py-0.5 rounded ml-1">ID:${v.qr}</span></span>
                        <span class="${ratingColor}">${ratingText}</span>
                        
                        <!-- Tooltip flotante (Glassmorphism) -->
                        <div class="pointer-events-none absolute bottom-[115%] left-1/2 -translate-x-1/2 mb-2 w-64 bg-slate-950/95 border ${isPerfect ? 'border-amber-400/50 shadow-[0_0_20px_rgba(251,191,36,0.4)]' : 'border-brand-500/30'} text-xs text-slate-200 p-3 rounded-xl shadow-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-50 backdrop-blur-md">
                            <div class="font-bold ${isPerfect ? 'text-amber-400' : 'text-amber-300'} mb-1 flex justify-between">
                                <span>${v.name} ${isPerfect ? '👑' : ''}</span>
                                <span class="text-amber-400">${v.avg.toFixed(1)}★</span>
                            </div>
                            <p class="font-light text-slate-400 leading-normal">${v.description}</p>
                            <div class="text-[9px] text-slate-500 mt-1.5 italic flex justify-between">
                                <span>ID del puesto: #${v.qr}</span>
                                <span>Total: ${v.count} reseñas</span>
                            </div>
                            <!-- Flecha del tooltip -->
                            <div class="absolute top-full left-1/2 -translate-x-1/2 border-4 border-transparent border-t-slate-950"></div>
                        </div>
                    </div>
                    `;
                }).join('') || '<p class="text-slate-500 text-xs italic">Sin datos suficientes</p>';
            } catch (e) { console.error("Error leaderboard:", e); }
        }

        async function updateFeed() {
            try {
                const res = await fetch(`${API_BASE}/feed`);
                if(!res.ok) return;
                const data = await res.json();
                const feedContainer = document.getElementById('liveFeed');
                
                feedContainer.innerHTML = data.map(r => {
                    let badgeColor = r.sentiment === 'Positivo' ? 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30' : 
                                   (r.sentiment === 'Negativo' ? 'bg-red-500/20 text-red-400 border-red-500/30' : 'bg-slate-500/20 text-slate-400 border-slate-500/30');
                    let stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
                    return `
                    <div class="bg-slate-800/80 p-4 rounded-xl border border-slate-700/50 transform transition duration-300 hover:scale-[1.02] hover:bg-slate-800 hover:border-slate-600 hover:shadow-lg">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center flex-wrap gap-2">
                                <span class="text-brand-300 font-bold text-sm drop-shadow-sm">${r.vendor_name}</span>
                                <span class="text-[10px] bg-slate-900 text-slate-400 px-2 py-0.5 rounded border border-slate-700">ID: ${r.vendor_qr}</span>
                            </div>
                            <span class="text-xs text-slate-400 font-medium">${r.time}</span>
                        </div>
                        <p class="text-slate-300 text-sm italic mb-3 leading-relaxed">"${r.comment}"</p>
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <span class="text-amber-400 text-xs tracking-widest drop-shadow">${stars}</span>
                                <span class="text-[11px] text-slate-400 font-medium flex items-center gap-1"><span class="text-slate-500">👤</span> @${r.customer_name}</span>
                            </div>
                            <span class="text-[10px] px-2.5 py-1 rounded-full border uppercase tracking-wider font-bold ${badgeColor}">${r.sentiment}</span>
                        </div>
                    </div>
                    `;
                }).join('');
            } catch (e) { console.error("Error feed:", e); }
        }

        // Iniciar carga de datos
        updateLeaderboards();
        updateFeed();
        // Polling cada 5 segundos
        setInterval(updateLeaderboards, 5000);
        setInterval(updateFeed, 5000);
    </script>
</body>
</html>
