<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificado de Confianza - MarketTrust</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: { brand: { 50: '#f0fdf4', 500: '#22c55e', 900: '#14532d' } }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <!-- Contenedor del Certificado (A4 Ratio) -->
    <div id="certificate" class="bg-white rounded-3xl shadow-2xl w-full max-w-3xl overflow-hidden relative transition-all duration-500 print:shadow-none print:w-[210mm] print:h-[297mm] print:rounded-none">
        
        <!-- Decoración Geométrica Superior -->
        <div class="absolute top-0 left-0 w-full h-40 bg-gradient-to-r from-brand-900 to-brand-500 transform -skew-y-3 origin-top-left z-0 shadow-inner"></div>
        <div class="absolute top-0 right-0 w-32 h-32 bg-white/20 rounded-full blur-2xl z-0"></div>
        
        <div class="relative z-10 p-12 flex flex-col h-full min-h-[800px]">
            
            <div class="text-center mb-10 pt-4">
                <div class="inline-block bg-white p-5 rounded-full shadow-[0_10px_30px_rgba(34,197,94,0.2)] border-2 border-brand-50 mb-6">
                    <svg class="w-16 h-16 text-brand-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <h1 class="text-slate-400 font-bold tracking-widest uppercase text-sm mb-3 letter-spacing-2">MarketTrust Oficial</h1>
                <h2 class="text-5xl font-black text-slate-800 mb-4 tracking-tight">Certificado de Confianza</h2>
                <div class="w-24 h-1.5 bg-gradient-to-r from-brand-500 to-emerald-300 mx-auto rounded-full"></div>
            </div>

            <div class="text-center flex-grow flex flex-col justify-center">
                <p class="text-slate-500 text-lg mb-2 font-medium">Otorgado con orgullo a</p>
                <h3 id="vendorName" class="text-4xl font-bold text-slate-900 mb-10">Cargando...</h3>
                
                <div class="flex justify-center items-center gap-12 mb-12">
                    <div class="text-center transform transition hover:scale-105 duration-300">
                        <div id="rating" class="text-6xl font-black text-amber-400 drop-shadow-sm mb-1">-.--</div>
                        <div class="flex justify-center mb-2 text-amber-400 text-xl">
                            ★★★★★
                        </div>
                        <div class="text-slate-500 text-sm uppercase tracking-wider font-bold">Calificación</div>
                    </div>
                    <div class="w-px h-24 bg-slate-200"></div>
                    <div class="text-center transform transition hover:scale-105 duration-300">
                        <div id="totalReviews" class="text-6xl font-black text-brand-500 drop-shadow-sm mb-3">-</div>
                        <div class="text-slate-500 text-sm uppercase tracking-wider font-bold">Reseñas Verificadas</div>
                    </div>
                </div>

                <div class="bg-gradient-to-b from-brand-50 to-white rounded-3xl p-8 border border-brand-100 shadow-sm relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-brand-500"></div>
                    <h4 class="text-brand-900 font-bold mb-6 uppercase text-sm tracking-widest">Atributos Destacados por Clientes</h4>
                    <div id="attributes" class="flex flex-wrap justify-center gap-4">
                        <span class="px-5 py-2.5 bg-white rounded-full text-brand-700 font-semibold shadow-sm border border-brand-200 animate-pulse">Analizando reseñas...</span>
                    </div>
                </div>
            </div>

            <!-- Espacio Publicitario Local -->
            <div class="mt-12 pt-6 border-t-2 border-dashed border-slate-200">
                <div class="bg-slate-50 rounded-2xl p-5 flex items-center justify-between border border-slate-100 transition hover:bg-slate-100">
                    <div class="text-left">
                        <span class="text-xs text-brand-500 uppercase font-black tracking-widest mb-1.5 block">Patrocinado por</span>
                        <h5 class="text-slate-800 font-bold text-xl mb-0.5">Banco Local Market</h5>
                        <p class="text-slate-500 text-sm">Apoyando el crecimiento de los emprendedores de nuestra comunidad.</p>
                    </div>
                    <div class="w-20 h-20 bg-white shadow-sm border border-slate-100 rounded-xl flex items-center justify-center">
                        <span class="text-slate-300 text-sm font-black tracking-widest">LOGO</span>
                    </div>
                </div>
            </div>
            
            <button onclick="window.print()" class="mt-6 mx-auto bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-full font-medium transition-colors print:hidden flex items-center gap-2 shadow-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                Imprimir Certificado
            </button>
        </div>
    </div>

    <script>
        async function loadData() {
            const urlParams = new URLSearchParams(window.location.search);
            const qr = urlParams.get('qr');
            if(!qr) { document.getElementById('vendorName').innerText = 'ID no proporcionado'; return; }

            try {
                const response = await fetch(`/api/vendors/${qr}/stats`);
                const data = await response.json();
                
                if(data.error) {
                    document.getElementById('vendorName').innerText = 'Vendedor no encontrado';
                    document.getElementById('rating').innerText = '0.0';
                    document.getElementById('totalReviews').innerText = '0';
                    document.getElementById('attributes').innerHTML = '<span class="text-slate-400 italic text-sm font-medium">Sin datos para mostrar</span>';
                    return;
                }

                document.getElementById('vendorName').innerText = data.vendor_name;
                document.getElementById('rating').innerText = data.average_rating.toFixed(1);
                document.getElementById('totalReviews').innerText = data.total_reviews;
                
                const attrContainer = document.getElementById('attributes');
                attrContainer.innerHTML = '';
                
                if(data.top_attributes && data.top_attributes.length > 0) {
                    data.top_attributes.forEach(attr => {
                        const span = document.createElement('span');
                        span.className = 'px-5 py-2.5 bg-white rounded-full text-brand-700 font-bold shadow-sm border border-brand-200 transform transition hover:-translate-y-1';
                        span.innerText = attr;
                        attrContainer.appendChild(span);
                    });
                } else {
                    const span = document.createElement('span');
                    span.className = 'text-slate-400 italic text-sm font-medium';
                    span.innerText = 'Se necesitan más reseñas para determinar atributos.';
                    attrContainer.appendChild(span);
                }

            } catch (error) {
                console.error("Error fetching stats:", error);
                document.getElementById('vendorName').innerText = 'Error de conexión';
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
